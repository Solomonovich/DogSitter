name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  firestore-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firestore-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: firestore-tests/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install deps
        run: npm ci
      - name: Run Firestore rules unit tests (emulator)
        run: npm run test:ci

  swift-helpers:
    name: SecurityKit unit tests
    runs-on: macos-14
    defaults:
      run:
        working-directory: SecurityKit
    steps:
      - uses: actions/checkout@v4
      - name: Run SecurityKit unit tests
        run: swift test

  functions-unit:
    name: Cloud Functions unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pure signature unit tests (no install required)
        run: node --test test/*.test.js
