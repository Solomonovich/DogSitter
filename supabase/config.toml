# Supabase config for DogSitter payments backend.
# App data stays in Firebase/Firestore; this project is ONLY the trusted payment
# compute (Edge Functions) + the authoritative ledger (Postgres).
project_id = "dogsitter-payments"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

# Auth is handled by Firebase (we verify the Firebase ID token ourselves inside each
# function), so Supabase's own JWT gate is disabled. The anon key is still required by
# the gateway and ships in the app (it is a public key).
[functions.charge-walk]
verify_jwt = false

[functions.charge-stay]
verify_jwt = false

[functions.payment-methods]
verify_jwt = false

[functions.get-balance]
verify_jwt = false

# Public config (no auth — the publishable key is public).
[functions.payment-config]
verify_jwt = false

# Card capture (Firebase-token authenticated inside the function).
[functions.setup-card]
verify_jwt = false

[functions.finalize-card]
verify_jwt = false

# Stripe webhook — authenticated by the Stripe-Signature HMAC, not a JWT.
[functions.stripe-webhook]
verify_jwt = false

# Refunds, manual payouts, receipts (Firebase-token authenticated inside).
[functions.refund]
verify_jwt = false

[functions.record-payout]
verify_jwt = false

[functions.get-payouts]
verify_jwt = false

[functions.receipts]
verify_jwt = false

# Dunning runner — invoked by Supabase cron, authenticated by x-cron-secret.
[functions.retry-charges]
verify_jwt = false

# Grow (Meshulam) IPN webhook — authenticated by the Grow shared-secret signature.
[functions.grow-webhook]
verify_jwt = false
